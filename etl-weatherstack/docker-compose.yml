version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: clima-postgres
    environment:
      POSTGRES_USER: dataminer
      POSTGRES_PASSWORD: secure_pass
      POSTGRES_DB: datawarehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataminer"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clima_network

  python-app:
    build: .
    container_name: clima-python-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dataminer:secure_pass@postgres:5432/datawarehouse
      API_KEY: ${OPENWEATHER_API_KEY:-demo}
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
    restart: always
    networks:
      - clima_network

volumes:
  postgres_data:

networks:
  clima_network:
    driver: bridge
